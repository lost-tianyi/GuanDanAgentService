# docker compose up --build -d
# 密钥：可在主机创建 server/.env 后取消注释挂载：
# volumes:
#   - ./server/.env:/app/server/.env:ro

services:
  guandan:
    build: .
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      # 生产建议用挂载的 server/.env，勿在仓库中写明文：
      # OPENAI_API_KEY: ""
      # COACH_UNLOCK_PASSWORD: ""
    restart: unless-stopped
